services:
  # Backend API
  - type: web
    name: abc-platform-api
    runtime: node
    rootDir: .
    buildCommand: npm install && npx prisma generate --schema packages/database/prisma/schema.prisma && npm run build --workspace @blink/api
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # Set manually in Render dashboard (Neon URL)
      - key: JWT_SECRET
        sync: false   # Set manually
      - key: GEMINI_API_KEY
        sync: false   # Set manually
      - key: EVOLUTION_API_BASE_URL
        sync: false   # URL of your hosted Evolution API
      - key: EVOLUTION_API_KEY
        sync: false   # Set manually
      - key: ADMIN_REGISTRATION_ID
        sync: false   # Set manually

  # WhatsApp Bridge (Evolution API Lite)
  - type: web
    name: abc-evolution-api
    runtime: node
    rootDir: evolution-api-lite
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
