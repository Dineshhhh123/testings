services:
  # Backend API — Node native (no Docker)
  - type: web
    name: abc-platform-api
    runtime: node
    rootDir: .
    buildCommand: npm install && npx prisma generate --schema packages/database/prisma/schema.prisma && npm run build --workspace @blink/api
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: EVOLUTION_API_BASE_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: ADMIN_REGISTRATION_ID
        sync: false
